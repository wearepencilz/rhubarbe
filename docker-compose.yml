version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rhubarbe-postgres
    environment:
      POSTGRES_DB: rhubarbe
      POSTGRES_USER: rhubarbe
      POSTGRES_PASSWORD: rhubarbe_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rhubarbe"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
