<svg width="60" height="20" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Platform 2: Stone - Gray stone blocks with mortar -->
  <!-- 60x20px sprite: [left 20px][center 20px][right 20px] -->
  
  <!-- Left cap (0-20px) -->
  <rect x="0" y="0" width="20" height="20" fill="#7A7A7A"/>
  <rect x="0" y="0" width="20" height="4" fill="#9A9A9A"/>
  <rect x="0" y="16" width="20" height="4" fill="#5A5A5A"/>
  <rect x="0" y="4" width="4" height="12" fill="#5A5A5A"/>
  <!-- Stone blocks -->
  <rect x="4" y="4" width="7" height="6" fill="#8A8A8A"/>
  <rect x="12" y="4" width="7" height="6" fill="#8A8A8A"/>
  <rect x="4" y="10" width="7" height="6" fill="#8A8A8A"/>
  <rect x="12" y="10" width="7" height="6" fill="#8A8A8A"/>
  <!-- Mortar lines -->
  <line x1="11" y1="4" x2="11" y2="16" stroke="#6A6A6A" stroke-width="1"/>
  <line x1="4" y1="10" x2="19" y2="10" stroke="#6A6A6A" stroke-width="1"/>
  
  <!-- Center section (20-40px) -->
  <rect x="20" y="0" width="20" height="20" fill="#7A7A7A"/>
  <rect x="20" y="0" width="20" height="4" fill="#9A9A9A"/>
  <rect x="20" y="16" width="20" height="4" fill="#5A5A5A"/>
  <!-- Stone blocks -->
  <rect x="20" y="4" width="9" height="6" fill="#8A8A8A"/>
  <rect x="30" y="4" width="9" height="6" fill="#8A8A8A"/>
  <rect x="20" y="10" width="9" height="6" fill="#8A8A8A"/>
  <rect x="30" y="10" width="9" height="6" fill="#8A8A8A"/>
  <!-- Mortar lines -->
  <line x1="29" y1="4" x2="29" y2="16" stroke="#6A6A6A" stroke-width="1"/>
  <line x1="20" y1="10" x2="40" y2="10" stroke="#6A6A6A" stroke-width="1"/>
  
  <!-- Right cap (40-60px) -->
  <rect x="40" y="0" width="20" height="20" fill="#7A7A7A"/>
  <rect x="40" y="0" width="20" height="4" fill="#9A9A9A"/>
  <rect x="40" y="16" width="20" height="4" fill="#5A5A5A"/>
  <rect x="56" y="4" width="4" height="12" fill="#5A5A5A"/>
  <!-- Stone blocks -->
  <rect x="40" y="4" width="7" height="6" fill="#8A8A8A"/>
  <rect x="48" y="4" width="7" height="6" fill="#8A8A8A"/>
  <rect x="40" y="10" width="7" height="6" fill="#8A8A8A"/>
  <rect x="48" y="10" width="7" height="6" fill="#8A8A8A"/>
  <!-- Mortar lines -->
  <line x1="47" y1="4" x2="47" y2="16" stroke="#6A6A6A" stroke-width="1"/>
  <line x1="40" y1="10" x2="56" y2="10" stroke="#6A6A6A" stroke-width="1"/>
</svg>
