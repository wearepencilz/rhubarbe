<svg width="60" height="20" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Platform 3: Ice - Light blue/cyan with crystalline texture -->
  <!-- 60x20px sprite: [left 20px][center 20px][right 20px] -->
  
  <!-- Left cap (0-20px) -->
  <rect x="0" y="0" width="20" height="20" fill="#A8D8EA"/>
  <rect x="0" y="0" width="20" height="4" fill="#D4F1F4"/>
  <rect x="0" y="16" width="20" height="4" fill="#7FB3D5"/>
  <rect x="0" y="4" width="4" height="12" fill="#7FB3D5"/>
  <!-- Ice crystals/highlights -->
  <rect x="4" y="4" width="4" height="4" fill="#D4F1F4" opacity="0.6"/>
  <rect x="10" y="6" width="6" height="2" fill="#D4F1F4" opacity="0.6"/>
  <rect x="6" y="10" width="4" height="4" fill="#D4F1F4" opacity="0.6"/>
  <rect x="12" y="12" width="4" height="2" fill="#D4F1F4" opacity="0.6"/>
  <!-- Cracks -->
  <line x1="8" y1="5" x2="14" y2="9" stroke="#7FB3D5" stroke-width="1" opacity="0.4"/>
  <line x1="5" y1="12" x2="16" y2="14" stroke="#7FB3D5" stroke-width="1" opacity="0.4"/>
  
  <!-- Center section (20-40px) -->
  <rect x="20" y="0" width="20" height="20" fill="#A8D8EA"/>
  <rect x="20" y="0" width="20" height="4" fill="#D4F1F4"/>
  <rect x="20" y="16" width="20" height="4" fill="#7FB3D5"/>
  <!-- Ice crystals/highlights -->
  <rect x="22" y="5" width="6" height="4" fill="#D4F1F4" opacity="0.6"/>
  <rect x="30" y="6" width="6" height="3" fill="#D4F1F4" opacity="0.6"/>
  <rect x="24" y="11" width="4" height="4" fill="#D4F1F4" opacity="0.6"/>
  <rect x="32" y="12" width="5" height="2" fill="#D4F1F4" opacity="0.6"/>
  <!-- Cracks -->
  <line x1="22" y1="7" x2="36" y2="10" stroke="#7FB3D5" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="13" x2="38" y2="14" stroke="#7FB3D5" stroke-width="1" opacity="0.4"/>
  
  <!-- Right cap (40-60px) -->
  <rect x="40" y="0" width="20" height="20" fill="#A8D8EA"/>
  <rect x="40" y="0" width="20" height="4" fill="#D4F1F4"/>
  <rect x="40" y="16" width="20" height="4" fill="#7FB3D5"/>
  <rect x="56" y="4" width="4" height="12" fill="#7FB3D5"/>
  <!-- Ice crystals/highlights -->
  <rect x="42" y="5" width="4" height="4" fill="#D4F1F4" opacity="0.6"/>
  <rect x="48" y="6" width="6" height="2" fill="#D4F1F4" opacity="0.6"/>
  <rect x="44" y="11" width="4" height="3" fill="#D4F1F4" opacity="0.6"/>
  <rect x="50" y="12" width="4" height="2" fill="#D4F1F4" opacity="0.6"/>
  <!-- Cracks -->
  <line x1="44" y1="6" x2="52" y2="9" stroke="#7FB3D5" stroke-width="1" opacity="0.4"/>
  <line x1="42" y1="13" x2="54" y2="14" stroke="#7FB3D5" stroke-width="1" opacity="0.4"/>
</svg>
